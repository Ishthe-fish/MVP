version: 2

sources:
  - name: raw
    description: Raw ingestion layer storing CSV data exactly as received before transformation.
    database: postgres
    schema: raw

    tables:
      - name: df1
        description: Raw source dataset 1.
        
      - name: df2
        description: Raw source dataset 2.
        
      - name: dedup_matches_final
        description: Output of the Python fuzzy matching engine prior to dbt transformation.
        columns:
          - name: confidence_match_score
            decription: Confidence score generated by our matching engine. 
            tests:
              - not_null

